input {
  gelf {
    host => "0.0.0.0"
    port => 12201
    use_udp => true
    use_tcp => true
    strip_leading_underscore => true
  }
}

filter {
  mutate {
    add_field => {
      "event_source" => "docker-compose"
      "training_stack" => "elasticsearch-training"
    }
  }

  if [short_message] {
    mutate {
      replace => { "message" => "%{short_message}" }
    }
  } else if [full_message] {
    mutate {
      replace => { "message" => "%{full_message}" }
    }
  }

  if [container_name] {
    mutate {
      gsub => [ "container_name", "^/", "" ]
      add_field => { "container_service" => "%{container_name}" }
    }
  } else if [tag] {
    mutate {
      add_field => { "container_service" => "%{tag}" }
    }
  }

  if [level] {
    mutate {
      rename => { "level" => "gelf_level" }
    }
  }

  json {
    source => "message"
    target => "parsed_log"
    skip_on_invalid_json => true
  }

  if [parsed_log][@timestamp] {
    date {
      match => [ "[parsed_log][@timestamp]", "ISO8601" ]
      target => "@timestamp"
    }
  }

  if [parsed_log][message] {
    mutate {
      replace => { "message" => "%{[parsed_log][message]}" }
    }
  }

  if [parsed_log][service] {
    mutate {
      add_field => { "service" => "%{[parsed_log][service]}" }
    }
  } else if [container_service] {
    mutate {
      add_field => { "service" => "%{container_service}" }
    }
  }

  if [parsed_log][level] {
    mutate {
      add_field => { "level" => "%{[parsed_log][level]}" }
    }
  } else if [message] =~ /(?i)\berror\b|\bexception\b|\bfailed\b/ {
    mutate { add_field => { "level" => "ERROR" } }
  } else if [message] =~ /(?i)\bwarn\b|\btimeout\b|\bretry\b/ {
    mutate { add_field => { "level" => "WARN" } }
  } else {
    mutate { add_field => { "level" => "INFO" } }
  }

  if [parsed_log][latency_ms] {
    mutate {
      add_field => { "latency_ms" => "%{[parsed_log][latency_ms]}" }
    }
  }

  if [parsed_log][status_code] {
    mutate {
      add_field => { "status_code" => "%{[parsed_log][status_code]}" }
    }
  }

  if [parsed_log][trace_id] {
    mutate {
      add_field => { "trace_id" => "%{[parsed_log][trace_id]}" }
    }
  }

  mutate {
    convert => {
      "latency_ms" => "integer"
      "status_code" => "integer"
    }
    remove_field => [ "parsed_log", "short_message", "full_message" ]
  }
}

output {
  elasticsearch {
    hosts => [ "http://elasticsearch:9200" ]
    index => "app-logs-%{+YYYY.MM.dd}"
  }
}
